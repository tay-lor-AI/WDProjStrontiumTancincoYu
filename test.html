<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../images/favicon.gif">
    <link rel="stylesheet" href="bulma.css">
    <link rel="stylesheet" href="test.css">
    <title>Fandom Roulette</title>
    <meta name="description"
        content="Bored in the summer? Want to take a break from schoolwork? Don't worry! We've got you covered! With the press of a quick button, we can randomly generate a fandom that might interest you, be it a book, show, or game!">
    <meta name="Xian, Emma" content="YuStrontium29, tay-lor-AI">
</head>

<body>
    
    <section class="hero is-fullheight is-transparent">

        <div class="hero-head">
            <div class="columns is-centered">
                <div class="column has-text-centered">
                    <h1 class="title">fandom roulette</h1>
                </div>
            </div>
        </div>


        <div class="hero-video">
            <video class="heroVideoDesktop" playsinline autoplay loop muted>
                <source src="homeBackground.mp4" type="video/mp4">
            </video>

            <video class="heroVideoMobile" playsinline autoplay loop muted>
                <source src="mobileHomeBackground.mp4" type="video/mp4">
            </video>
        </div>

        <div class="hero-body">
            <div class="container">
                <div class="heroBodyContainer">
                    <div class="columns is-centered has-text-centered">
                        <button id="bigbutton">ROLL</button>
                        <script>
                            const Pages = [
                                "./fandoms/fnaf.html",
                                ".fandoms/jjk.html",
                                "./fandoms/magnusChase.html",
                                "./fandoms/soImASpider.html",
                                "./fandoms/isat.html",
                                "./fandoms/hollowSkong.html",
                                "./fandoms/worm.html",
                                "./fandoms/genshin.html",
                                "./fandoms/cookieRun.html",
                                "./fandoms/criticalRole.html",
                                "./fandoms/pjo.html",
                                "./fandoms/helloCharlotte.html",
                                "./fandoms/hermitcraft.html",
                                "./fandoms/psychopomp.html",
                            ];

                            rollButton = document.getElementById("bigbutton");

                            rollButton.addEventListener("click", () => {
                                randomIndex = Math.floor(Math.random() * Pages.length);
                                window.location.href = Pages[randomIndex];
                            })
                        </script>
                    </div>
                    <div class="columns is-centered has-text-centered">
                        <p id="message">Tap the ROLL button to find a new Fandom!</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-foot">
            <footer id="footer-housing">
                <div class="container">
                    <div class="container">
                        <div class="columns is-mobile is-centered">
                            <p>pee</p>
                        </div>
                    </div>
                    <div class="columns is-mobile is-centered">
                        <div class="column has-text-centered">
                            <p>hi</p>
                        </div>
                        <div class="column has-text-centered">
                            <p>hi</p>
                        </div>
                        <div class="column has-text-centered">
                            <p>hi</p>
                        </div>
                        <div class="column has-text-centered">
                            <p>hi</p>
                        </div>
                    </div>
                </div>
            </footer>
        </div>

    </section>

</body>




</html>
